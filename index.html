<div class="game-wrap">
  <h2 class="sr-only">Truth or Dare party game for couples and groups</h2>

  <!-- SETUP SCREEN -->
  <div class="screen active" id="screen-setup">
    <h1 class="title">Truth or Dare</h1>
    <p class="subtitle">Add your players, then spin the bottle</p>

    <div class="result-card" id="result-card">

    <span class="skip-link" id="skip-link" onclick="nextTurn()" style="display:none">Skip & pass</span>
  </div>

  <!-- END SCREEN -->
  <div class="screen" id="screen-end">
    <div class="end-screen">
      <div class="big-icon"><i class="ti ti-confetti" style="font-size:52px;color:#7F77DD" aria-hidden="true"></i></div>

</div>

function getGenderIcon(g) {
  if (g === 'male') return '<i class="ti ti-gender-male" aria-hidden="true"></i>';
  if (g === 'female') return '<i class="ti ti-gender-female" aria-hidden="true"></i>';
  return '<i class="ti ti-gender-bigender" aria-hidden="true"></i>';
}

function getInitials(name) {
  return name.trim().split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2) || '?';
}

function addPlayer() {
  playerCount++;
  const id = 'p' + Date.now();
  players.push({ id, name: '', gender: '' });
  renderPlayers();
}

function removePlayer(id) {
  players = players.filter(p => p.id !== id);
  renderPlayers();
}

function setGender(id, g) {
  const p = players.find(x => x.id === id);
  if (p) p.gender = g;
  renderPlayers();
}

function updateName(id, val) {
  const p = players.find(x => x.id === id);
  if (p) p.name = val;
  checkStart();
}

function checkStart() {
  const valid = players.length >= 2 && players.every(p => p.name.trim().length > 0);
  document.getElementById('start-btn').disabled = !valid;
}

function renderPlayers() {
  const list = document.getElementById('players-list');
  list.innerHTML = players.map((p, i) => `
    <div class="player-row">
      <input type="text" placeholder="Player ${i+1} name" value="${p.name}" oninput="updateName('${p.id}', this.value)" maxlength="20" />
      <div class="gender-pills">
        <button class="gender-pill male ${p.gender==='male'?'selected male':''}" onclick="setGender('${p.id}','male')"><i class="ti ti-gender-male" aria-hidden="true"></i></button>
        <button class="gender-pill female ${p.gender==='female'?'selected female':''}" onclick="setGender('${p.id}','female')"><i class="ti ti-gender-female" aria-hidden="true"></i></button>

      ${players.length > 2 ? `<button class="remove-btn" onclick="removePlayer('${p.id}')" aria-label="Remove player"><i class="ti ti-x" aria-hidden="true"></i></button>` : ''}
    </div>
  `).join('');
  checkStart();
}

function startGame() {
  const valid = players.every(p => p.name.trim());
  if (!valid || players.length < 2) return;
  currentIdx = 0;
  round = 1;
  usedTruths = new Set();
  usedDares = new Set();
  showScreen('screen-game');
  renderTurn();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderTurn() {
  const p = players[currentIdx];
  const avatar = document.getElementById('player-avatar');
  avatar.className = 'avatar ' + (p.gender || 'default');
  avatar.textContent = getInitials(p.name);
  document.getElementById('player-name').textContent = p.name;
  document.getElementById('round-badge').textContent = 'Round ' + round;
  document.getElementById('choice-row').style.display = 'grid';
  document.getElementById('result-card').classList.remove('visible');
  document.getElementById('next-btn').classList.remove('visible');
  document.getElementById('skip-link').style.display = 'none';

  const strip = document.getElementById('players-strip');
  strip.innerHTML = players.map((pl, i) => {
    const dotClass = 'dot dot-' + (pl.gender || 'default');
    return `<div class="player-chip ${i === currentIdx ? 'active' : ''}"><span class="${dotClass}"></span>${pl.name}</div>`;
  }).join('');
}

  if (type === 'truth') {
    typeEl.className = 'result-type truth';
    typeEl.innerHTML = `<i class="ti ti-message-circle-question" aria-hidden="true"></i><span>Truth</span><span class="result-number">#${idx+1}</span>`;
  } else {
    typeEl.className = 'result-type dare';
    typeEl.innerHTML = `<i class="ti ti-flame" aria-hidden="true"></i><span>Dare</span><span class="result-number">#${idx+1}</span>`;
  }
  textEl.textContent = pool[idx];
  card.classList.add('visible', 'spin-anim');
  setTimeout(() => card.classList.remove('spin-anim'), 400);

  document.getElementById('next-btn').classList.add('visible');
  document.getElementById('skip-link').style.display = 'block';
}

function nextTurn() {
  currentIdx = (currentIdx + 1) % players.length;
  if (currentIdx === 0) round++;
  if (round > 10) { showScreen('screen-end'); return; }
  renderTurn();
}

function restartGame() {
  players = [{ id: 'p1', name: '', gender: '' }, { id: 'p2', name: '', gender: '' }];
  renderPlayers();
  showScreen('screen-setup');
}

players = [{ id: 'p1', name: '', gender: '' }, { id: 'p2', name: '', gender: '' }];
renderPlayers();
</script>
